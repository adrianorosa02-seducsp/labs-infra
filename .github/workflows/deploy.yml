FROM python:3.13-slim

# Removida a linha 'git push origin' que causava erro de build
ENV PYTHONDONTWRITEBYTECODE=1
ENV PYTHONUNBUFFERED=1

# Instalamos o Poetry para que a imagem saiba gerenciar os pacotes do aluno
RUN pip install --no-cache-dir poetry

WORKDIR /app

# ESTRATÉGIA DE BUILD:
# No momento do build (no servidor), o Docker vai olhar para a pasta do Lab.
# Se houver um pyproject.toml lá, ele instala as dependências.
ONBUILD COPY pyproject.toml poetry.lock* /app/
ONBUILD RUN poetry config virtualenvs.create false \
    && poetry install --no-interaction --no-ansi --no-root || true

# Porta padrão do Traefik
EXPOSE 8000

# Comando com --proxy-headers para o Traefik
CMD ["python", "-m", "uvicorn", "fast_zero.app:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers"]